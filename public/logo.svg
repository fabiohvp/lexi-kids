<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD600" />
      <stop offset="100%" stop-color="#FF9100" />
    </linearGradient>
    
    <!-- Cartoon Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="10" stdDeviation="0" flood-color="#7B3F00" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background App Icon Shape (Rounded Square) -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#bgGrad)" stroke="#FF6F00" stroke-width="12" filter="url(#dropShadow)" />

  <!-- Playful grid/bubbles in background -->
  <circle cx="100" cy="120" r="30" fill="#FFF" opacity="0.2" />
  <circle cx="400" cy="380" r="45" fill="#FFF" opacity="0.15" />
  <circle cx="420" cy="140" r="20" fill="#FFF" opacity="0.2" />
  <circle cx="90" cy="390" r="25" fill="#FFF" opacity="0.2" />

  <!-- Cute Pencil Icon in the corner -->
  <g transform="translate(320, 80) rotate(15)" filter="url(#dropShadow)">
    <!-- Pencil Body -->
    <path d="M 0,0 L 40,0 L 40,120 L 20,150 L 0,120 Z" fill="#FF5252" stroke="#333" stroke-width="6" stroke-linejoin="round" />
    <!-- Pencil Tip -->
    <path d="M 20,150 L 0,120 L 40,120 Z" fill="#FFE082" stroke="#333" stroke-width="6" stroke-linejoin="round" />
    <path d="M 20,150 L 10,135 L 30,135 Z" fill="#333" />
    <!-- Pencil Eraser -->
    <path d="M 0,0 L 40,0 L 40,-20 C 40,-30 0,-30 0,-20 Z" fill="#FF8A80" stroke="#333" stroke-width="6" stroke-linejoin="round" />
    <rect x="0" y="0" width="40" height="15" fill="#B0BEC5" stroke="#333" stroke-width="6" stroke-linejoin="round" />
  </g>

  <!-- Colorful Alphabet Blocks / Bubbles -->
  <!-- Letter L Block -->
  <g transform="translate(100, 220) rotate(-10)" filter="url(#dropShadow)">
    <rect x="-60" y="-60" width="120" height="120" rx="25" fill="#29B6F6" stroke="#01579B" stroke-width="8" />
    <rect x="-45" y="-45" width="90" height="90" rx="15" fill="#81D4FA" opacity="0.4" />
    <text x="0" y="28" font-family="'Fredoka', 'Arial Black', sans-serif" font-weight="900" font-size="85" fill="#FFFFFF" text-anchor="middle" stroke="#01579B" stroke-width="4">L</text>
  </g>

  <!-- Letter E Block -->
  <g transform="translate(225, 180) rotate(5)" filter="url(#dropShadow)">
    <rect x="-60" y="-60" width="120" height="120" rx="25" fill="#AB47BC" stroke="#4A148C" stroke-width="8" />
    <rect x="-45" y="-45" width="90" height="90" rx="15" fill="#E1BEE7" opacity="0.4" />
    <text x="0" y="28" font-family="'Fredoka', 'Arial Black', sans-serif" font-weight="900" font-size="85" fill="#FFFFFF" text-anchor="middle" stroke="#4A148C" stroke-width="4">E</text>
  </g>

  <!-- Letter X Block -->
  <g transform="translate(350, 230) rotate(15)" filter="url(#dropShadow)">
    <rect x="-60" y="-60" width="120" height="120" rx="25" fill="#66BB6A" stroke="#1B5E20" stroke-width="8" />
    <rect x="-45" y="-45" width="90" height="90" rx="15" fill="#C8E6C9" opacity="0.4" />
    <text x="0" y="28" font-family="'Fredoka', 'Arial Black', sans-serif" font-weight="900" font-size="85" fill="#FFFFFF" text-anchor="middle" stroke="#1B5E20" stroke-width="4">X</text>
  </g>

  <!-- Letter I Block -->
  <g transform="translate(230, 310) rotate(-5)" filter="url(#dropShadow)">
    <rect x="-50" y="-50" width="100" height="100" rx="20" fill="#FF7043" stroke="#BF360C" stroke-width="8" />
    <rect x="-38" y="-38" width="76" height="76" rx="12" fill="#FFCCBC" opacity="0.4" />
    <text x="0" y="25" font-family="'Fredoka', 'Arial Black', sans-serif" font-weight="900" font-size="75" fill="#FFFFFF" text-anchor="middle" stroke="#BF360C" stroke-width="4">I</text>
  </g>

  <!-- KIDS Text banner -->
  <g transform="translate(256, 420)" filter="url(#dropShadow)">
    <!-- Ribbon background -->
    <path d="M -180,-40 L 180,-40 L 160,20 L -160,20 Z" fill="#FFCA28" stroke="#FF8F00" stroke-width="8" stroke-linejoin="round" />
    
    <text x="0" y="5" font-family="'Fredoka', 'Arial Black', sans-serif" font-weight="900" font-size="55" fill="#FFFFFF" text-anchor="middle" stroke="#D84315" stroke-width="12" paint-order="stroke fill" letter-spacing="6">KIDS</text>
    <text x="0" y="5" font-family="'Fredoka', 'Arial Black', sans-serif" font-weight="900" font-size="55" fill="#D84315" text-anchor="middle" letter-spacing="6">KIDS</text>
  </g>

  <!-- Sparkles -->
  <path d="M 80,80 L 85,95 L 100,100 L 85,105 L 80,120 L 75,105 L 60,100 L 75,95 Z" fill="#FFF" filter="url(#dropShadow)" />
  <path d="M 420,290 L 423,298 L 431,300 L 423,302 L 420,310 L 417,302 L 409,300 L 417,298 Z" fill="#FFF" filter="url(#dropShadow)" />
</svg>
